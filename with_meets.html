<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>With×MEETS アルバム | 蓮ノ空女学院スクールアイドルクラブ 103期生卒業企画</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/album.css">
    <style>
        /* with_meets テーマカラー */
        :root {
            --album-hero-from:      #f093fb;
            --album-hero-to:        #f5576c;
            --album-tab-color:      #f093fb;
            --album-title-color:    #be185d;
            --album-spine-from:     #b8607e;
            --album-spine-mid:      #e08098;
            --album-spine-to:       #c07088;
            --album-spine-shadow1:  #d4819a;
            --album-spine-shadow2:  #b8607e;
            --album-book-bg:        #fdf0f5;
            --album-shadow-color:   rgba(100, 30, 50, 0.3);
            --album-card-shadow:    rgba(100, 30, 50, 0.16);
            --album-lb-close-hover: #ffe0f5;
            --album-img-bg:         #fde8f5;
        }
    </style>
</head>
<body>
    <!-- ヘッダー -->
    <div id="header"></div>

    <!-- ページヒーロー -->
    <section class="page-hero">
        <div class="container page-hero-content">
            <h2>💌 With×MEETS</h2>
            <p>日々の喜びを分かち合った、あの時間</p>
        </div>
    </section>

    <!-- アルバム -->
    <main class="album-page">
        <div class="container">
            <div class="album-book" data-album="with_meets">
                <div class="album-header">
                    <h3>🖼️ 完成イメージ。画像募集中！</h3>
                </div>

                <div class="tab-list" role="tablist">
                    <button class="tab-btn active" role="tab" data-tab="tab-103">103期</button>
                    <button class="tab-btn" role="tab" data-tab="tab-104">104期</button>
                    <button class="tab-btn" role="tab" data-tab="tab-105">105期</button>
                </div>

                <div class="tab-panel active" id="tab-103" role="tabpanel">
                    <p class="tab-loading">読み込み中...</p>
                </div>
                <div class="tab-panel" id="tab-104" role="tabpanel">
                    <p class="tab-loading">読み込み中...</p>
                </div>
                <div class="tab-panel" id="tab-105" role="tabpanel">
                    <p class="tab-loading">読み込み中...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ライトボックス -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <div class="lightbox-inner">
            <button class="lightbox-close" onclick="closeLightbox()">✕</button>
            <img id="lightbox-img" src="" alt="">
        </div>
    </div>

    <!-- フッター -->
    <div id="footer"></div>

    <script src="js/include.js"></script>
    <script src="js/script.js"></script>
    <script src="js/album.js"></script>
</body>
</html>
