<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓮ノ三連華 卒業アルバム企画</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- ヘッダー -->
    <div id="header"></div>

    <!-- メインビジュアル -->
    <section class="hero" id="home">
        <div class="container">
            <div class="hero-content">
                <h2>3年間の軌跡を振り返る、<br>特大の卒業アルバムを作りませんか？</h2>
            </div>
        </div>
    </section>

    <!-- 画像ストリップ -->
    <div class="photo-strip">
        <div class="photo-strip-track">
            <!-- 1セット目 -->
            <div class="strip-item"><img src="images/top3.png" alt="思い出の1枚"></div>
            <div class="strip-item"><img src="images/top2.png" alt="思い出の1枚"></div>
            <div class="strip-item"><img src="images/top1.png" alt="思い出の1枚"></div>
            <div class="strip-item"><img src="images/top4.png" alt="思い出の1枚"></div>
            <div class="strip-item"><img src="images/top5.png" alt="思い出の1枚"></div>
            <div class="strip-item"><img src="images/top6.png" alt="思い出の1枚"></div>
            <!-- 2セット目（シームレスループ用） -->
            <div class="strip-item"><img src="images/top_sub1.png" alt="思い出の1枚"></div>
            <div class="strip-item"><img src="images/top_sub2.png" alt="思い出の1枚"></div>
            <div class="strip-item"><img src="images/top_sub3.png" alt="思い出の1枚"></div>
            <div class="strip-item"><img src="images/top_sub4.png" alt="思い出の1枚"></div>
            <div class="strip-item"><img src="images/top_sub5.png" alt="思い出の1枚"></div>
            <div class="strip-item"><img src="images/top_sub6.jpg" alt="思い出の1枚"></div>
            <div class="strip-item"><img src="images/top_sub7.jpg" alt="思い出の1枚"></div>
            <div class="strip-item"><img src="images/top_sub8.jpg" alt="思い出の1枚"></div>
        </div>
    </div>

    <!-- 告知セクション -->
    <section class="announcement">
        <div class="container">
            <div class="announcement-box">
                <h3>蓮ノ三連華の卒業に合わせ、3人とファンの軌跡を記録！</h3>
                <h3>3年間の感謝と愛を込めて、彼女達の歩みを一緒に残しませんか？</h3>
                <h3>思い出の画像、スクショを大募集！</h3>
                <br>
                <h4>【募集期間】3/29~4/12</h4>
                <a href="https://docs.google.com/forms/d/1ZrZ6ZUZgME8PHkvXvlcpb-SmaUzmExudpR6-SQJ6zdM/edit">参加する！</a>
            </div>
        </div>
    </section>

    <!-- コンテンツカード -->
    <section class="content-cards" id="sections">
        <div class="container">
            <div class="section-header">
                <h3>アルバム一覧(仮)</h3>
            </div>
            <div class="cards-grid">
                <!-- Fes×LIVE -->
                <div class="card" id="message">
                    <div class="card-icon"><img src="images/kaho.jpg" alt="Fes×LIVE"></div>
                    <h3>Fes×LIVE</h3>
                    <a href="fes_live.html" class="card-button">詳しく見る</a>
                </div>

                <!-- With×MEETS -->
                <div class="card" id="illustration">
                    <div class="card-icon"><img src="images/sayaka.jpg" alt="With×MEETS"></div>
                    <h3>With×MEETS</h3>
                    <a href="with_meets.html" class="card-button">詳しく見る</a>
                </div>

                <!-- 好き好きクラブの活動記録 -->
                <div class="card" id="info">
                    <div class="card-icon"><img src="images/rurino.jpg" alt="好き好きクラブの活動記録"></div>
                    <h3>好き好きクラブの活動記録</h3>
                    <a href="activity.html" class="card-button">詳しく見る</a>
                </div>
            </div>
        </div>
    </section>

    <!-- フッター -->
    <div id="footer"></div>

    <script src="js/include.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
